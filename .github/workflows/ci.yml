name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: swift test
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pin to the toolchain the project is verified against (Xcode 16.3 / Swift 6.1).
      # The runner's default Xcode applies stricter Swift concurrency diagnostics that
      # the project does not target, so we select 16.3 explicitly to match local builds.
      - name: Select Xcode 16.3
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.3'

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: swift test
